# Fork-specific image build. Pushes to ghcr.io/dmoose/answer on every
# main commit and on tag pushes. Consumed by tenant compose stacks
# (catapulsion, frontierguild, aeyrea) — see infra/design.md.
#
# Does NOT replace upstream's Docker Hub workflows; this is additive and
# only runs on the dmoose fork.

name: Build Fork Image (ghcr.io)

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:  # let me trigger manually for testing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/answer

jobs:
  build:
    # Skip on other forks so a clone doesn't try to publish images.
    if: github.repository_owner == 'dmoose'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for any version-stamping

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        # Only push on main / tag / dispatch — skip on PR.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag rules:
          #   push to main      → :latest, :main-<sha7>, :sha-<full>
          #   push to v1.2.3    → :v1.2.3, :1.2.3, :1.2, :1
          #   push to v1.2.3-RC → :v1.2.3-RC (no :latest update)
          #   pull request      → :pr-<n> (build only, not pushed)
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short,prefix=sha-
            type=sha,format=long,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-') }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Apache Answer (dmoose fork, multisite build)
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build (and push if not PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.multisite
          platforms: linux/amd64    # Hetzner is x86; ARM64 doubles CI time for no consumer
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
